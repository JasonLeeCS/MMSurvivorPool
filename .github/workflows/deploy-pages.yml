name: Deploy GitHub Pages

on:
  push:
    branches: ["master", "main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm install
      - run: npm run build
        env:
          VITE_APPS_SCRIPT_BASE_URL: ${{ vars.VITE_APPS_SCRIPT_BASE_URL }}
          VITE_USE_MOCK_API: ${{ vars.VITE_USE_MOCK_API || 'false' }}
          VITE_SEASON_YEAR: ${{ vars.VITE_SEASON_YEAR || '2026' }}
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH || format('/{0}/', github.event.repository.name) }}
          VITE_ADMIN_ROUTE_SLUG: ${{ vars.VITE_ADMIN_ROUTE_SLUG || 'commissioner-portal' }}
          VITE_ENABLE_UNIQUE_LINK_FLOW: ${{ vars.VITE_ENABLE_UNIQUE_LINK_FLOW || 'false' }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
